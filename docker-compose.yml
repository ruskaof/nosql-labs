services:
  application:
    build: .
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_completed_successfully
    networks:
      - main-network

  redis:
    image: redis:8.6.1
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
    networks:
      - main-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  mongo-config-1:
    image: mongo:8.2.6
    command: ["mongod", "--configsvr", "--replSet", "cfgReplSet", "--port", "27017", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--port", "27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongo-config-1-data:/data/db

  mongo-config-2:
    image: mongo:8.2.6
    command: ["mongod", "--configsvr", "--replSet", "cfgReplSet", "--port", "27017", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-config-2-data:/data/db

  mongo-config-3:
    image: mongo:8.2.6
    command: ["mongod", "--configsvr", "--replSet", "cfgReplSet", "--port", "27017", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-config-3-data:/data/db

  mongo-shard1-1:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard1ReplSet", "--port", "27018", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard1-1-data:/data/db

  mongo-shard1-2:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard1ReplSet", "--port", "27018", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard1-2-data:/data/db

  mongo-shard1-3:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard1ReplSet", "--port", "27018", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard1-3-data:/data/db

  mongo-shard2-1:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard2ReplSet", "--port", "27019", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard2-1-data:/data/db

  mongo-shard2-2:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard2ReplSet", "--port", "27019", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard2-2-data:/data/db

  mongo-shard2-3:
    image: mongo:8.2.6
    command: ["mongod", "--shardsvr", "--replSet", "shard2ReplSet", "--port", "27019", "--bind_ip_all"]
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
    networks:
      - main-network
    volumes:
      - mongo-shard2-3-data:/data/db

  mongo-init:
    image: mongo:8.2.6
    depends_on:
      mongo-config-1:
        condition: service_healthy
      mongo-shard1-1:
        condition: service_started
      mongo-shard1-2:
        condition: service_started
      mongo-shard1-3:
        condition: service_started
      mongo-shard2-1:
        condition: service_started
      mongo-shard2-2:
        condition: service_started
      mongo-shard2-3:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - main-network
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        mongosh --host mongo-config-1 --port 27017 --eval 'rs.initiate({_id:"cfgReplSet",configsvr:true,members:[{_id:0,host:"mongo-config-1:27017"},{_id:1,host:"mongo-config-2:27017"},{_id:2,host:"mongo-config-3:27017"}]})' || true
        mongosh --host mongo-shard1-1 --port 27018 --eval 'rs.initiate({_id:"shard1ReplSet",members:[{_id:0,host:"mongo-shard1-1:27018"},{_id:1,host:"mongo-shard1-2:27018"},{_id:2,host:"mongo-shard1-3:27018"}]})' || true
        mongosh --host mongo-shard2-1 --port 27019 --eval 'rs.initiate({_id:"shard2ReplSet",members:[{_id:0,host:"mongo-shard2-1:27019"},{_id:1,host:"mongo-shard2-2:27019"},{_id:2,host:"mongo-shard2-3:27019"}]})' || true
        for i in $(seq 1 60); do
          if mongosh --host mongo --port 27017 --quiet --eval 'db.adminCommand({listShards:1}).ok' | grep -q "1"; then
            break
          fi
          sleep 2
        done
        for i in $(seq 1 60); do
          if mongosh --host mongo --port 27017 --quiet --eval 'sh.addShard("shard1ReplSet/mongo-shard1-1:27018,mongo-shard1-2:27018,mongo-shard1-3:27018").ok' | grep -q "1"; then
            break
          fi
          sleep 2
        done
        for i in $(seq 1 60); do
          if mongosh --host mongo --port 27017 --quiet --eval 'sh.addShard("shard2ReplSet/mongo-shard2-1:27019,mongo-shard2-2:27019,mongo-shard2-3:27019").ok' | grep -q "1"; then
            break
          fi
          sleep 2
        done
        mongosh --host mongo --port 27017 --eval 'sh.enableSharding("'"${MONGODB_DATABASE}"'")' || true
        mongosh --host mongo --port 27017 --eval 'db.getSiblingDB("admin").runCommand({shardCollection:"'"${MONGODB_DATABASE}"'.events",key:{created_by:"hashed"}})' || true

  mongo:
    image: mongo:8.2.6
    command: ["mongos", "--configdb", "cfgReplSet/mongo-config-1:27017,mongo-config-2:27017,mongo-config-3:27017", "--bind_ip_all", "--port", "27017"]
    depends_on:
      mongo-config-1:
        condition: service_healthy
      mongo-config-2:
        condition: service_started
      mongo-config-3:
        condition: service_started
    ports:
      - "${MONGODB_PORT}:27017"
    networks:
      - main-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--port", "27017", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

networks:
  main-network:

volumes:
  mongo-config-1-data:
  mongo-config-2-data:
  mongo-config-3-data:
  mongo-shard1-1-data:
  mongo-shard1-2-data:
  mongo-shard1-3-data:
  mongo-shard2-1-data:
  mongo-shard2-2-data:
  mongo-shard2-3-data:
